{% extends 'base.html' %}

{% block title %}Novo Chamado - Gratia Localiza{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('customer.dashboard') }}" class="text-secondary text-decoration-none fw-medium">
        <i class="bi bi-arrow-left me-1"></i> Voltar para os chamados
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card">
            <h2 class="mb-2">Abrir Novo Chamado</h2>
            <p class="text-secondary mb-4">Descreva detalhadamente o seu problema ou dúvida para que nosso suporte possa ajudar.</p>
            
            <form action="{{ url_for('customer.create_ticket') }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Título da Solicitação</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="Ex: Problema com acesso ao painel financeiro" required>
                </div>
                
                <div class="mb-4">
                    <label for="description" class="form-label">Descrição Detalhada</label>
                    <textarea class="form-control" id="description" name="description" rows="6" placeholder="Descreva os passos para reproduzir o problema, mensagens de erro, etc." required></textarea>
                </div>
                
                <div class="d-flex gap-3 justify-content-end">
                    <a href="{{ url_for('customer.dashboard') }}" class="btn btn-premium-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-premium">Enviar Chamado</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
