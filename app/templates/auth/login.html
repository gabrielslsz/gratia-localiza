{% extends 'base.html' %}

{% block title %}Entrar - Gratia Localiza{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="bi bi-headset text-primary display-4 mb-2 d-inline-block"></i>
                <h2 class="mb-1">Seja bem-vindo</h2>
                <p class="text-secondary">Faça login para gerenciar seus chamados</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Endereço de E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-secondary);">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="nome@exemplo.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label for="password" class="form-label mb-0">Senha</label>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-secondary);">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Sua senha" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium w-100 mb-3">Entrar</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="text-secondary mb-0">Não possui uma conta? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-semibold">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
